{% extends 'base.html' %}

{% block content %}

<h2 class="text-center mb-4">Edit Student</h2>

<form action="{{ url_for('update_students', id=student[0]) }}" method="POST" class="row g-2">

    <div class="col-md-4">
        <input type="text" name="name" class="form-control" value="{{ student[1] }}" required>
    </div>

    <div class="col-md-3">
        <input type="number" name="age" class="form-control" value="{{ student[2] }}" required>
    </div>

    <div class="col-md-3">
        <input type="text" name="grade" class="form-control" value="{{ student[3] }}" required>
    </div>

    <div class="col-md-2">
        <button class="btn btn-success w-100">Update</button>
    </div>

</form>

<!-- BACK BUTTON -->
<div class="mt-3">
    <a href="{{ url_for('index') }}" class="btn btn-secondary">Back</a>
</div>

{% endblock %}
