{% extends 'base.html' %}

{% block content %}

<h2 class="text-center mb-4">Student Management System</h2>

<!-- ADD STUDENT FORM -->
<form action="{{ url_for('add_students') }}" method="POST" class="row g-2 mb-4">
    <div class="col-md-4">
        <input type="text" name="name" class="form-control" placeholder="Name" required>
    </div>
    <div class="col-md-3">
        <input type="number" name="age" class="form-control" placeholder="Age" required>
    </div>
    <div class="col-md-3">
        <input type="text" name="grade" class="form-control" placeholder="Grade" required>
    </div>
    <div class="col-md-2">
        <button class="btn btn-success w-100">Add Student</button>
    </div>
</form>

<!-- STUDENT TABLE -->
<table class="table table-bordered table-striped text-center">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Grade</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>

    {% for student in students %}
    <tr>
        <td>{{ student[0] }}</td>
        <td>{{ student[1] }}</td>
        <td>{{ student[2] }}</td>
        <td>{{ student[3] }}</td>

        <td>
            
            <a href="{{ url_for('edit_student', id=student[0]) }}" 
               class="btn btn-warning btn-sm">
               Edit
            </a>

            
            <form action="{{ url_for('delete_students', id=student[0]) }}" 
                  method="POST" 
                  style="display:inline;">
                <button class="btn btn-danger btn-sm"
                        onclick="return confirm('Are you sure?')">
                    Delete
                </button>
            </form>
        </td>
    </tr>

    {% else %}
    <tr>
        <td colspan="5" class="text-muted">No students found</td>
    </tr>
    {% endfor %}

    </tbody>
</table>

{% endblock %}
